name: Release Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (example: v1.2.5)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS arm64
            artifact_name: macos-arm64
            build_command: npm run electron:release:mac -- --arm64
            artifact_paths: |
              release/*.dmg
              release/*.zip
          - os: windows-latest
            label: Windows x64
            artifact_name: windows-x64
            build_command: npm run electron:release:win -- --x64
            artifact_paths: |
              release/*.exe
              release/*.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop artifacts
        run: ${{ matrix.build_command }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_TAG}" ]]; then
            RELEASE_TAG="${INPUT_TAG}"
          fi
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --target "$TARGET_SHA" --title "$RELEASE_TAG" --generate-notes
          fi
          find dist -type f -print0 | xargs -0 -I{} gh release upload "$RELEASE_TAG" "{}" --clobber
